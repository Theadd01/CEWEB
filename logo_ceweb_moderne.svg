<svg width="100%" viewBox="0 0 560 80" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Logo CEWEB</title>

  <!-- Monogramme C -->
  <g transform="translate(40, 40)">
    <path d="M 10 -18 A 22 22 0 1 0 10 18" fill="none" stroke="#D4713A" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="10" y1="-18" x2="20" y2="-18" stroke="#D4713A" stroke-width="2" stroke-linecap="round"/>
    <line x1="10" y1="0"   x2="18" y2="0"   stroke="#D4713A" stroke-width="2" stroke-linecap="round"/>
    <line x1="10" y1="18"  x2="20" y2="18"  stroke="#D4713A" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Séparateur vertical -->
  <line x1="80" y1="20" x2="80" y2="60" stroke="#D4D0C8" stroke-width="1"/>

  <!-- CEWEB texte -->
  <text x="96" y="44" font-family="'Playfair Display', Georgia, serif" font-size="22" font-weight="700" fill="#1C1A16" letter-spacing="3">CEWEB</text>

  <!-- Tagline -->
  <text x="97" y="61" font-family="'DM Sans', -apple-system, sans-serif" font-size="8.5" font-weight="600" fill="#9E9890" letter-spacing="3.5">CRÉATION WEB</text>

</svg>
