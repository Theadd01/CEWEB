<svg width="100%" viewBox="0 0 680 200" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Logo CEWEB</title>
  <desc>Logo CEWEB style moderne avec accent amber, adapté à un site dark mode</desc>

  <rect x="200" y="20" width="280" height="160" rx="8" fill="#181610"/>
  <rect x="201" y="21" width="278" height="158" rx="7" fill="none" stroke="#9B5425" stroke-width="0.5"/>

  <!-- Monogramme C géométrique amber -->
  <g transform="translate(260, 100)">
    <circle cx="0" cy="0" r="32" fill="none" stroke="#D4713A" stroke-width="0.4" opacity="0.4"/>
    <path d="M 14 -22 A 28 28 0 1 0 14 22" fill="none" stroke="#D4713A" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="14" y1="-22" x2="24" y2="-22" stroke="#D4713A" stroke-width="2" stroke-linecap="round"/>
    <line x1="14" y1="0" x2="22" y2="0" stroke="#D4713A" stroke-width="2" stroke-linecap="round"/>
    <line x1="14" y1="22" x2="24" y2="22" stroke="#D4713A" stroke-width="2" stroke-linecap="round"/>
    <!-- Point lumineux -->
    <circle cx="0" cy="0" r="2" fill="#E8956A" opacity="0.6"/>
  </g>

  <!-- Séparateur -->
  <line x1="308" y1="72" x2="308" y2="128" stroke="#9B5425" stroke-width="0.5" opacity="0.8"/>

  <!-- CEWEB -->
  <text x="388" y="96" text-anchor="middle" font-family="Georgia, serif" font-size="28" font-weight="400" fill="#EDE9DC" letter-spacing="8">CEWEB</text>

  <!-- Ligne décorative -->
  <line x1="325" y1="108" x2="451" y2="108" stroke="#D4713A" stroke-width="0.5"/>
  <circle cx="335" cy="108" r="1.5" fill="#D4713A"/>
  <circle cx="441" cy="108" r="1.5" fill="#D4713A"/>

  <!-- Tagline -->
  <text x="388" y="126" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#D4713A" letter-spacing="4">CRÉATION WEB</text>

</svg>
